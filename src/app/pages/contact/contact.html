<!-- Page Header -->
<section class="page-header d-flex align-items-center justify-content-center text-center">
  <div>
    <h1 class="display-4 fw-bold">Contact Us</h1>
    <p class="lead">We'd love to hear from you!</p>
    <div class="page-header-accent"></div>
  </div>
</section>

<!-- Contact Section -->
<section class="py-5">
  <div class="container">
    <div class="row g-5">

      <!-- Contact Form -->
      <div class="col-md-7">
        <h3 class="fw-bold text-white mb-4">Send us a message</h3>
        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" formControlName="name" placeholder="Your name">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email" placeholder="Your email">
          </div>
          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" formControlName="message" rows="5" placeholder="Your message"></textarea>
          </div>
          <button type="submit" class="btn btn-isa-orange px-5">
            Send Message &nbsp;<i class="fas fa-paper-plane"></i>
          </button>
        </form>
      </div>

      <!-- Contact Info -->
      <div class="col-md-5">
        <h3 class="fw-bold text-white mb-4">Get in touch</h3>
        <p class="text-white-50">Have a question or want to get involved? Reach out to us directly.</p>
        <ul class="list-unstyled mt-4">
          <li class="mb-3">
            <i class="fas fa-envelope me-2 text-isa-orange"></i>
            <a href="mailto:isa@example.com" class="contact-info-link">isa&#64;example.com</a>
          </li>
          <li class="mb-3">
            <i class="fab fa-instagram me-2 text-isa-purple"></i>
            <a href="#" class="contact-info-link">&#64;isa_official</a>
          </li>
          <li class="mb-3">
            <i class="fab fa-facebook me-2 text-isa-orange"></i>
            <a href="#" class="contact-info-link">ISA Facebook</a>
          </li>
          <li class="mb-3">
            <i class="fab fa-linkedin me-2 text-isa-green"></i>
            <a href="#" class="contact-info-link">ISA LinkedIn</a>
          </li>
        </ul>
      </div>

    </div>
  </div>
</section>
