<!-- Page Header -->
<section class="page-header d-flex align-items-center justify-content-center text-center">
  <div>
    <h1 class="display-4 fw-bold">Blog</h1>
    <p class="lead">Thoughts, stories and updates from the ISA community</p>
    <div class="page-header-accent"></div>
  </div>
</section>

<!-- Blog Posts -->
<section class="py-5">
  <div class="container">
    <div class="row g-4">
      @for (post of blogPosts(); track post.id) {
        <div class="col-md-4">
          <div class="isa-card h-100 overflow-hidden">
            <img [src]="post.imageUrl" class="w-100 blog-card-img" [alt]="post.title">
            <div class="p-4">
              <p class="text-white-50 small mb-2">
                <i class="fas fa-user me-1 text-isa-green"></i> {{ post.author }}
                <span class="ms-3">
                  <i class="fas fa-calendar-alt me-1 text-isa-green"></i> {{ post.date }}
                </span>
              </p>
              <h5 class="fw-bold text-white mb-2">{{ post.title }}</h5>
              <p class="text-white-50 small mb-3">{{ post.excerpt }}</p>
              <button class="btn btn-isa-green w-100">Read More &nbsp;<i class="fas fa-arrow-right"></i></button>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
