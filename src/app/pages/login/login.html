<!-- Page Header -->
<section class="page-header d-flex align-items-center justify-content-center text-center">
  <div>
    <h1 class="display-4 fw-bold">Welcome Back</h1>
    <p class="lead">Sign in to your ISA account</p>
    <div class="page-header-accent"></div>
  </div>
</section>

<!-- Login Section -->
<section class="py-5 d-flex justify-content-center">
  <div class="login-card">
    <h3 class="fw-bold text-white mb-4 text-center">Sign In</h3>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="your@email.com">
        @if (email?.invalid && email?.touched) {
          <div class="form-error">Please enter a valid email.</div>
        }
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="••••••••">
        @if (password?.invalid && password?.touched) {
          <div class="form-error">Password must be at least 6 characters.</div>
        }
      </div>

      <button type="submit" class="btn btn-isa-orange w-100 py-2" [disabled]="loginForm.invalid">
        Sign In &nbsp;<i class="fas fa-sign-in-alt"></i>
      </button>

    </form>

    <p class="text-center mt-4 text-white-50">
      Don't have an account?
      <a routerLink="/register" class="text-isa-orange text-decoration-none">Register here</a>
    </p>
  </div>
</section>
